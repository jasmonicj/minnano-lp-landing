<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif">
  <rect width="800" height="520" fill="white"/>
  
  <!-- タイトル -->
  <text x="400" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a">【図1】システム構成図</text>

  <!-- クライアント -->
  <rect x="30" y="60" width="120" height="70" rx="8" fill="#FDF6E3" stroke="#3D2B1F" stroke-width="2"/>
  <text x="90" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#3D2B1F">クライアント端末</text>
  <text x="90" y="106" text-anchor="middle" font-size="10" fill="#3D2B1F">（スマートフォン等）</text>
  <text x="90" y="120" text-anchor="middle" font-size="10" fill="#3D2B1F">メッセージング</text>

  <!-- メッセージングサービス -->
  <rect x="220" y="60" width="130" height="70" rx="8" fill="#E8D5B0" stroke="#3D2B1F" stroke-width="2"/>
  <text x="285" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#3D2B1F">メッセージング</text>
  <text x="285" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#3D2B1F">サービス</text>
  <text x="285" y="120" text-anchor="middle" font-size="10" fill="#666">（LINE等）</text>

  <!-- 矢印 クライアント→メッセージング -->
  <line x1="150" y1="95" x2="218" y2="95" stroke="#3D2B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="184" y="88" text-anchor="middle" font-size="9" fill="#666">修正依頼</text>

  <!-- Webhookサーバ -->
  <rect x="420" y="60" width="130" height="70" rx="8" fill="#4A7C59" stroke="#3D2B1F" stroke-width="2"/>
  <text x="485" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Webhookサーバ</text>
  <text x="485" y="104" text-anchor="middle" font-size="10" fill="#ddd">（サーバーレス</text>
  <text x="485" y="118" text-anchor="middle" font-size="10" fill="#ddd">処理基盤）</text>

  <!-- 矢印 メッセージング→Webhook -->
  <line x1="350" y1="95" x2="418" y2="95" stroke="#3D2B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="384" y="88" text-anchor="middle" font-size="9" fill="#666">Webhook</text>

  <!-- クライアント管理DB -->
  <rect x="620" y="45" width="140" height="55" rx="8" fill="#E8D5B0" stroke="#3D2B1F" stroke-width="2"/>
  <text x="690" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#3D2B1F">クライアント管理</text>
  <text x="690" y="84" text-anchor="middle" font-size="11" font-weight="bold" fill="#3D2B1F">データベース</text>
  <text x="690" y="95" text-anchor="middle" font-size="9" fill="#666">（ID↔リポジトリ対応）</text>

  <!-- 矢印 Webhook→DB -->
  <line x1="550" y1="75" x2="618" y2="68" stroke="#3D2B1F" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowSmall)"/>
  <text x="584" y="66" text-anchor="middle" font-size="9" fill="#666">参照</text>

  <!-- 記憶ファイル管理 -->
  <rect x="620" y="120" width="140" height="65" rx="8" fill="#F5A623" stroke="#3D2B1F" stroke-width="2"/>
  <text x="690" y="143" text-anchor="middle" font-size="11" font-weight="bold" fill="white">記憶ファイル</text>
  <text x="690" y="159" text-anchor="middle" font-size="10" fill="white">（memory.md）</text>
  <text x="690" y="175" text-anchor="middle" font-size="9" fill="#fff">関係性Lv・ペルソナ他</text>

  <!-- 矢印 Webhook→記憶ファイル -->
  <line x1="550" y1="105" x2="618" y2="145" stroke="#3D2B1F" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowSmall)"/>
  <text x="574" y="132" text-anchor="middle" font-size="9" fill="#666">取得・更新</text>

  <!-- AIシステム -->
  <rect x="220" y="210" width="280" height="80" rx="8" fill="#3D2B1F" stroke="#F5A623" stroke-width="2.5"/>
  <text x="360" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#F5A623">AIシステム</text>
  <text x="360" y="256" text-anchor="middle" font-size="10" fill="#ddd">（大規模言語モデルAPI）</text>
  <text x="360" y="272" text-anchor="middle" font-size="10" fill="#ddd">プロンプト動的注入 → ソースコード修正生成</text>

  <!-- 矢印 Webhook→AI -->
  <line x1="485" y1="130" x2="420" y2="210" stroke="#3D2B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="468" y="178" text-anchor="middle" font-size="9" fill="#666">修正依頼＋</text>
  <text x="468" y="190" text-anchor="middle" font-size="9" fill="#666">システムプロンプト</text>

  <!-- バージョン管理システム -->
  <rect x="30" y="350" width="160" height="70" rx="8" fill="#E8735A" stroke="#3D2B1F" stroke-width="2"/>
  <text x="110" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="white">バージョン管理</text>
  <text x="110" y="391" text-anchor="middle" font-size="11" font-weight="bold" fill="white">システム</text>
  <text x="110" y="407" text-anchor="middle" font-size="9" fill="#fff">（GitHub等）</text>

  <!-- 矢印 AI→バージョン管理 -->
  <line x1="280" y1="290" x2="180" y2="350" stroke="#3D2B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="320" text-anchor="middle" font-size="9" fill="#666">修正済み</text>
  <text x="210" y="332" text-anchor="middle" font-size="9" fill="#666">ソースコード</text>

  <!-- ホスティングサービス -->
  <rect x="260" y="350" width="160" height="70" rx="8" fill="#4A7C59" stroke="#3D2B1F" stroke-width="2"/>
  <text x="340" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="white">ホスティング</text>
  <text x="340" y="391" text-anchor="middle" font-size="11" font-weight="bold" fill="white">サービス</text>
  <text x="340" y="407" text-anchor="middle" font-size="9" fill="#fff">（Vercel等）</text>

  <!-- 矢印 バージョン管理→ホスティング -->
  <line x1="190" y1="385" x2="258" y2="385" stroke="#3D2B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="224" y="378" text-anchor="middle" font-size="9" fill="#666">自動デプロイ</text>

  <!-- 本番LP -->
  <rect x="500" y="350" width="160" height="70" rx="8" fill="#C9E4F0" stroke="#3D2B1F" stroke-width="2"/>
  <text x="580" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#3D2B1F">本番環境</text>
  <text x="580" y="391" text-anchor="middle" font-size="11" font-weight="bold" fill="#3D2B1F">（クライアントLP）</text>
  <text x="580" y="407" text-anchor="middle" font-size="9" fill="#555">修正反映済みページ</text>

  <!-- 矢印 ホスティング→本番 -->
  <line x1="420" y1="385" x2="498" y2="385" stroke="#3D2B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="459" y="378" text-anchor="middle" font-size="9" fill="#666">公開</text>

  <!-- 担当者端末 -->
  <rect x="500" y="210" width="140" height="70" rx="8" fill="#FDF6E3" stroke="#3D2B1F" stroke-width="2"/>
  <text x="570" y="235" text-anchor="middle" font-size="11" font-weight="bold" fill="#3D2B1F">担当者端末</text>
  <text x="570" y="251" text-anchor="middle" font-size="10" fill="#555">離脱リスクアラート</text>
  <text x="570" y="267" text-anchor="middle" font-size="10" fill="#555">エラー通知受信</text>

  <!-- 矢印 Webhook→担当者 -->
  <line x1="550" y1="130" x2="560" y2="208" stroke="#3D2B1F" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowSmall)"/>
  <text x="575" y="175" text-anchor="middle" font-size="9" fill="#666">通知</text>

  <!-- 完了通知の矢印（本番→メッセージング→クライアント） -->
  <path d="M 580 350 Q 580 310 480 290 Q 380 270 285 210" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowGold)"/>
  <text x="430" y="298" text-anchor="middle" font-size="9" fill="#F5A623">完了通知</text>

  <!-- 矢印マーカー定義 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3D2B1F"/>
    </marker>
    <marker id="arrowSmall" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3D2B1F"/>
    </marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#F5A623"/>
    </marker>
  </defs>

  <!-- 凡例 -->
  <rect x="30" y="460" width="740" height="45" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <line x1="50" y1="482" x2="80" y2="482" stroke="#3D2B1F" stroke-width="2"/>
  <polygon points="80,479 88,482 80,485" fill="#3D2B1F"/>
  <text x="95" y="486" font-size="10" fill="#333">主要データフロー</text>
  <line x1="200" y1="482" x2="230" y2="482" stroke="#3D2B1F" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="230,479 238,482 230,485" fill="#3D2B1F"/>
  <text x="245" y="486" font-size="10" fill="#333">参照・通知</text>
  <line x1="340" y1="482" x2="370" y2="482" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="370,479 378,482 370,485" fill="#F5A623"/>
  <text x="385" y="486" font-size="10" fill="#333">完了通知（クライアントへ返信）</text>
</svg>
