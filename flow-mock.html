<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #7494c0;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
  display: flex;
  justify-content: center;
  min-height: 100vh;
}
#app {
  width: 100%;
  max-width: 420px;
  background: #7494c0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: relative;
}
#header {
  background: #4a6fa5;
  color: #fff;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
#header h1 { font-size: 16px; font-weight: 600; }
#reset-btn {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
}
#reset-btn:hover { background: rgba(255,255,255,0.35); }
#phase-indicator {
  background: rgba(0,0,0,0.45);
  color: #fff;
  padding: 4px 12px;
  font-size: 11px;
  text-align: center;
  flex-shrink: 0;
  z-index: 10;
}
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
}
.msg-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-row.bot { justify-content: flex-start; }
.msg-row.user { justify-content: flex-end; }
.bubble {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
}
.msg-row.bot .bubble {
  background: #fff;
  color: #333;
  border-bottom-left-radius: 4px;
}
.msg-row.user .bubble {
  background: #5cb85c;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.bot-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #e8c94a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  color: #fff;
  font-weight: bold;
}
#quick-reply-area {
  background: #f5f5f5;
  border-top: 1px solid #ddd;
  padding: 10px 12px;
  flex-shrink: 0;
  min-height: 56px;
  display: flex;
  align-items: center;
}
#quick-reply-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  white-space: nowrap;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 2px;
  width: 100%;
}
#quick-reply-scroll::-webkit-scrollbar { height: 3px; }
#quick-reply-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
.qr-btn {
  background: #fff;
  border: 1.5px solid #5cb85c;
  color: #5cb85c;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  flex-shrink: 0;
  font-weight: 500;
  transition: all 0.15s;
}
.qr-btn:hover { background: #5cb85c; color: #fff; }
.qr-btn.action { border-color: #e8833a; color: #e8833a; }
.qr-btn.action:hover { background: #e8833a; color: #fff; }
.typing-dots { display: flex; gap: 4px; padding: 12px 16px; }
.typing-dots span {
  width: 8px; height: 8px; background: #999; border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}
.hidden { display: none !important; }
</style>
</head>

const chat = document.getElementById('chat');
const qrScroll = document.getElementById('quick-reply-scroll');
const phaseEl = document.getElementById('phase-indicator');

let selectedOptions = [];
let selectedBlocks = [];
let batchItems = [];
let state = {};

function setPhase(t) { phaseEl.textContent = t; }
function scrollToBottom() { requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; }); }

function addBot(text, delay) {
  return new Promise(resolve => {
    const typing = document.createElement('div');
    typing.className = 'msg-row bot';
    typing.innerHTML = '<div class="bot-icon">LP</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
    chat.appendChild(typing);
    scrollToBottom();
    setTimeout(() => {
      typing.remove();
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.innerHTML = '<div class="bot-icon">LP</div><div class="bubble"></div>';
      row.querySelector('.bubble').textContent = text;
      chat.appendChild(row);
      scrollToBottom();
      resolve();
    }, delay || 600);
  });
}

function addUser(text) {
  return new Promise(resolve => {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = '<div class="bubble"></div>';
    row.querySelector('.bubble').textContent = text;
    chat.appendChild(row);
    scrollToBottom();
    setTimeout(resolve, 200);
  });
}

function clearQR() { qrScroll.innerHTML = ''; }

function showQR(buttons) {
  clearQR();
  buttons.forEach(btn => {
    const el = document.createElement('button');
    el.className = 'qr-btn' + (btn.action ? ' action' : '');
    el.textContent = btn.label;
    el.onclick = () => { clearQR(); btn.handler(); };
    qrScroll.appendChild(el);
  });
  scrollToBottom();
}

// ── Phase 0: 友だち追加〜決済 ──

  setPhase('Phase 0: 友だち追加・ペルソナ選択');
  await addBot(MSG.welcome);
  await addBot(MSG.selectPersona);
  showQR(PERSONAS.map(p => ({ label: p.label, handler: () => step_afterPersona(p) })));
}

async function step_afterPersona(p) {
  await addUser(p.label);
  state.persona = p;
  await addBot(MSG.personaGreeting);
  step_contract();
}

async function step_contract() {
  setPhase('Phase 0: 契約タイプ選択');
  await addBot(MSG.selectContract);
  showQR(CONTRACT_TYPES.map(c => ({
    label: c.qrLabel,
    handler: async () => {
      await addUser(c.qrLabel);
      state.contract = c;
      await addBot(MSG.confirmContract(c.label, c.amount));
      step_plan();
    },
  })));
}

async function step_plan() {
  setPhase('Phase 0: プラン選択');
  await addBot(MSG.selectPlan);
  showQR(PLANS.map(p => ({
    label: p.qrLabel,
    handler: async () => {
      await addUser(p.qrLabel);
      state.plan = p;
      await addBot(MSG.confirmPlan(p.label));
      step_options();
    },
  })));
}

async function step_options() {
  setPhase('Phase 0: オプション選択');
  selectedOptions = [];
  await addBot(MSG.selectOptions);
  showOptionBtns();
}

function optQRLabel(o) {
  const parts = [];
  if (o.initialAmount) parts.push(`¥${(o.initialAmount / 1000)}k`);
  if (o.monthlyAmount) parts.push(`¥${o.monthlyAmount.toLocaleString()}/月`);
  return `${o.label} ${parts.join('+')}`.substring(0, 20);
}

function showOptionBtns() {
  const remaining = OPTIONS.filter(o => !selectedOptions.includes(o.key));
  const btns = remaining.map(o => ({
    label: optQRLabel(o),
    handler: async () => {
      selectedOptions.push(o.key);
      await addUser(o.label);
      await addBot(MSG.optionAdded(o.label));
      await addBot(MSG.optionMore);
      showOptionBtns();
    },
  }));
  if (selectedOptions.length > 0) {
    btns.unshift({ label: '決定', action: true, handler: async () => { await addUser('決定'); step_summary(); } });
  } else {
    btns.push({ label: 'オプションなし', action: true, handler: async () => { await addUser('オプションなし'); step_summary(); } });
  }
  showQR(btns);
}

async function step_summary() {
  setPhase('Phase 0: 規約同意・お見積もり');
  const c = state.contract;
  const p = state.plan;
  let initialTotal = c.amount;
  let monthlyTotal = p.monthly;
  let optLines = '';
  for (const k of selectedOptions) {
    const o = OPTIONS.find(x => x.key === k);
    if (o) {
      initialTotal += o.initialAmount;
      monthlyTotal += o.monthlyAmount;
      optLines += `\n  ${o.label}：初期 ¥${o.initialAmount.toLocaleString()} / 月額 ¥${o.monthlyAmount.toLocaleString()}`;
    }
  }
  await addBot(MSG.summary(c.label, c.amount, p.label, optLines, initialTotal, monthlyTotal));
  await addBot(MSG.termsLinks);
  await addBot(MSG.termsConfirm);
  showQR([
    { label: '同意してお支払いへ', handler: step_checkout },
    { label: 'やり直す', action: true, handler: resetFlow },
  ]);
}

async function step_checkout() {
  await addUser('同意してお支払いへ');
  setPhase('Phase 0: 決済');
  await addBot(MSG.checkout);
  showQR([{ label: '決済完了（テスト用に次へ）', action: true, handler: step_paymentDone }]);
}

async function step_paymentDone() {
  await addUser('（決済完了）');
  setPhase('Phase 1: ヒアリング開始');
  await addBot(MSG.hearingStart);
  phase1(0);
}

// ── Phase 1: 共通質問 ──

async function phase1(idx) {
  if (idx >= HEARING_QUESTIONS.length) return phase1_summary();
  const q = HEARING_QUESTIONS[idx];
  const total = HEARING_QUESTIONS.length;
  setPhase(`Phase 1: 共通質問 ${idx + 1}/${total}`);
  await addBot(`（${idx + 1}/${total}）${q.q}`);

  const dummy = DUMMY_ANSWERS[q.field];
  const btns = [];

  if (q.quickReplies) {
    q.quickReplies.forEach(qr => {
      btns.push({ label: qr, handler: async () => {
        await addUser(qr);
        await addBot(MSG.hearingConfirm(q.label, qr));
        phase1(idx + 1);
      }});
    });
    if (dummy) {
      btns.push({ label: `${dummy}（ダミー）`, handler: async () => {
        await addUser(dummy);
        await addBot(MSG.hearingConfirm(q.label, dummy));
        phase1(idx + 1);
      }});
    }
  } else {
    btns.push({ label: `${dummy}（ダミー回答）`, handler: async () => {
      await addUser(dummy);
      await addBot(MSG.hearingConfirm(q.label, dummy));
      phase1(idx + 1);
    }});
  }
  if (idx > 0) {
    btns.push({ label: '← 戻る', handler: async () => { await addUser('戻る'); phase1(idx - 1); } });
  }
  showQR(btns);
}

async function phase1_summary() {
  setPhase('Phase 1: ヒアリング内容確認');
  await addBot(MSG.hearingSummary(DUMMY_ANSWERS));
  showQR([
    { label: 'OK', handler: async () => { await addUser('OK'); phase2(); } },
    { label: 'やり直す', handler: async () => { await addUser('やり直す'); await addBot(MSG.hearingRedo); phase1(0); } },
    { label: '← 戻る', handler: async () => { await addUser('戻る'); phase1(HEARING_QUESTIONS.length - 1); } },
  ]);
}

// ── Phase 2: ブロック選択 ──

async function phase2() {
  setPhase('Phase 2: ブロック選択');
  selectedBlocks = [];
  await addBot(MSG.selectBlocks);
  showBlockBtns();
}

function showBlockBtns() {
  const remaining = CONTENT_BLOCKS.filter(b => !selectedBlocks.includes(b.key));
  const btns = [];

  if (selectedBlocks.length > 0) {
    btns.push({ label: '決定', action: true, handler: async () => { await addUser('決定'); phase3(0); } });
  }

  remaining.forEach(b => {
    btns.push({ label: b.label, handler: async () => {
      selectedBlocks.push(b.key);
      await addUser(b.label);
      await addBot(MSG.blockAdded(b.label));
      showBlockBtns();
    }});
  });

  if (selectedBlocks.length === 0) {
    btns.push({ label: 'おまかせ', action: true, handler: async () => {
      await addUser('おまかせ');
      selectedBlocks = [...OMAKASE_BLOCKS];
      const names = OMAKASE_BLOCKS.map(k => CONTENT_BLOCKS.find(b => b.key === k).label).join('、');
      await addBot(MSG.blockOmakase(names));
      phase3(0);
    }});
    btns.push({ label: '決定', action: true, handler: async () => {
      await addUser('決定');
      await addBot(MSG.blockEmpty);
      showBlockBtns();
    }});
  }

  showQR(btns);
}

// ── Phase 3: ブロック別追加質問 ──

async function phase3(idx) {
  if (idx >= selectedBlocks.length) return hearingDone();
  const key = selectedBlocks[idx];
  const block = CONTENT_BLOCKS.find(b => b.key === key);
  if (!block) { phase3(idx + 1); return; }
  setPhase(`Phase 3: ${block.label} ${idx + 1}/${selectedBlocks.length}`);
  await addBot(`（${block.label}）${block.q}`);

  const btns = [];
  if (block.quickReplies) {
    block.quickReplies.forEach(qr => {
      btns.push({ label: qr, handler: async () => {
        await addUser(qr);
        await addBot(MSG.blockAnswer);
        phase3(idx + 1);
      }});
    });
  }
  btns.push({ label: `${block.dummy.substring(0, 18)}…（ダミー）`, handler: async () => {
    await addUser(block.dummy);
    await addBot(MSG.blockAnswer);
    phase3(idx + 1);
  }});
  showQR(btns);
}

async function hearingDone() {
  setPhase('ヒアリング完了');
  const blockNames = selectedBlocks.map(k => CONTENT_BLOCKS.find(b => b.key === k)?.label || k).join('\n  ・');
  await addBot(MSG.hearingComplete(blockNames));
  showQR([{ label: 'LP完成通知をシミュレート', action: true, handler: lpComplete }]);
}

// ── LP完成通知 → クライアント確認 ──

async function lpComplete() {
  await addUser('（LP完成通知）');
  setPhase('LP完成 → クライアント確認');
  await addBot(MSG.lpComplete);
  showQR([
    { label: 'この内容でリリースする', handler: releaseLP },
    { label: '修正する', handler: revisionFlow },
  ]);
}

async function releaseLP() {
  await addUser('この内容でリリースする');
  setPhase('リリース → スタッフ確認');
  await addBot(MSG.releaseConfirm);
  showQR([
    { label: '公開完了をシミュレート', action: true, handler: async () => {
      await addBot(MSG.maintenanceStart);
      showQR([{ label: 'フローを最初からやり直す', action: true, handler: resetFlow }]);
    }},
  ]);
}

// ── 修正フロー（バッチ処理） ──

async function revisionFlow() {
  await addUser('修正する');
  setPhase('修正フロー（バッチ処理）');
  batchItems = [];
  showRevisionBtns();
}

function showRevisionBtns() {
  const nextIdx = batchItems.length;
  if (nextIdx >= DUMMY_REVISIONS.length) {
    // ダミー修正を使い切った
    showQR([
      { label: '以上', action: true, handler: executeBatch },
      { label: 'クリア', action: true, handler: clearBatch },
    ]);
    return;
  }
  const btns = [];
  if (batchItems.length > 0) {
    btns.push({ label: '以上', action: true, handler: executeBatch });
    btns.push({ label: 'クリア', action: true, handler: clearBatch });
  }
  btns.push({
    label: `修正${nextIdx + 1}を送信（ダミー）`,
    handler: async () => {
      const text = DUMMY_REVISIONS[nextIdx];
      batchItems.push(text);
      await addUser(text);
      await addBot(MSG.batchList(batchItems));
      showRevisionBtns();
    },
  });
  showQR(btns);
}

async function executeBatch() {
  await addUser('以上');
  await addBot(MSG.batchAccept(batchItems.length));
  showQR([{
    label: '修正完了をシミュレート', action: true,
    handler: async () => {
      await addBot(MSG.batchDone(batchItems.length));
      showQR([
        { label: 'LP確認画面へ', action: true, handler: lpComplete },
        { label: 'フローを最初からやり直す', action: true, handler: resetFlow },
      ]);
    },
  }]);
}

async function clearBatch() {
  await addUser('クリア');
  await addBot(MSG.batchCleared);
  batchItems = [];
  showRevisionBtns();
}

// ── Reset & Init ──

function resetFlow() {
  chat.innerHTML = '';
  clearQR();
  selectedOptions = [];
  selectedBlocks = [];
  batchItems = [];
  state = {};
  step_welcome();
}

step_welcome();
</script>
</body>
